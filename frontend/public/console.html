<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola ESP32</title>
    <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>
    <div class="main-wrapper" style="max-width: 800px; padding: 20px;">
        <div class="terminal-container" id="terminalContainer" style="display: flex; height: 80vh;">
            <div class="terminal-header" style="display: flex;">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span style="margin-left: 10px; font-weight: 500; flex-grow: 1;">ESP32 Serial Monitor (Historial y En Vivo)</span>
                <span id="espStatusIndicator" class="status-badge offline">OFFLINE</span>
            </div>
            <div class="terminal-output" id="terminalOutput">
                <!-- Los logs aparecerán aquí -->
            </div>
        </div>
    </div>

    <!-- Menú Inferior Flotante (Pill) -->
    <nav class="bottom-pill-menu">
        <a href="/" class="pill-btn">INICIO</a>
        <a href="/console.html" class="pill-btn active">CONSOLA</a>
        <a href="#" class="pill-btn" onclick="alert('Próximamente')">AJUSTES</a>
        <a href="#" class="pill-btn" onclick="alert('Próximamente')">PERFIL</a>
    </nav>

    <script src="/js/console.js?v=2"></script>
</body>
</html>
