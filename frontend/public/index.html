<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Portón Cereva</title>
    <!-- Referencia al archivo CSS separado -->
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Acceso Seguro</h2>
                <span id="espStatusIndicator" class="status-badge offline">OFFLINE</span>
            </div>
            
            <input type="password" id="password" placeholder="Introduce tu clave de acceso">
            <button id="abrirBtn" onclick="abrirPorton()">ABRIR PORTÓN</button>
            <div id="status"></div>
            
            <a href="/console.html" style="display: block; text-align: center; margin-top: 20px; background: transparent; border: 1px solid var(--border); color: #94a3b8; font-size: 13px; padding: 10px; text-decoration: none; border-radius: 8px;">Ir a la Consola Serial</a>
        </div>
    </div>

    <!-- Referencia al archivo JS separado con versionado para evitar caché -->
    <script src="/js/main.js?v=4"></script>
</body>
</html>
