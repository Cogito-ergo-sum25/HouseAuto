<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Portón Cereva</title>
    <!-- Referencia al archivo CSS separado -->
    <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>
    <div class="main-wrapper">
        <!-- Dashboard Hub Superior -->
        <div class="hub-dashboard">
            <div class="hub-header">
                <div class="hub-time-container">
                    <div id="hub-time" class="hub-time">--:--:--</div>
                    <div id="hub-date" class="hub-date">Cargando...</div>
                </div>
                <div class="hub-status-container">
                    <span class="hub-label">ESTADO DE CONEXIÓN</span>
                    <span id="espStatusIndicator" class="status-badge offline">OFFLINE</span>
                </div>
            </div>
        </div>

        <!-- Contenedor de Acceso Seguro -->
        <div class="container">
            <h2 style="margin-bottom: 20px;">Acceso Seguro</h2>
            
            <input type="password" id="password" placeholder="Introduce tu clave de acceso">
            <button id="abrirBtn" onclick="abrirPorton()">ABRIR PORTÓN</button>
            <div id="status"></div>
        </div>
    </div>

    <!-- Menú Inferior Flotante (Pill) -->
    <nav class="bottom-pill-menu">
        <a href="/" class="pill-btn active">INICIO</a>
        <a href="/console.html" class="pill-btn">CONSOLA</a>
        <a href="#" class="pill-btn" onclick="alert('Próximamente')">AJUSTES</a>
        <a href="#" class="pill-btn" onclick="alert('Próximamente')">PERFIL</a>
    </nav>

    <!-- Referencia al archivo JS separado con versionado para evitar caché -->
    <script src="/js/main.js?v=5"></script>
</body>
</html>
